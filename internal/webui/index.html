<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDP 文件接收站</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #ece9df;
      --muted: #8b918a;
      --panel: #111513;
      --line: #303832;
      --signal: #c8ff5d;
      --flare: #ff6b35;
      --void: #090b0a;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(200,255,93,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,93,.035) 1px, transparent 1px),
        radial-gradient(circle at 82% 17%, rgba(255,107,53,.12), transparent 28rem),
        var(--void);
      background-size: 34px 34px, 34px 34px, auto, auto;
      font-family: "SFMono-Regular", "Cascadia Code", "Liberation Mono", monospace;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .32;
      background-image: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.018) 3px 4px);
    }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 14px;
      height: 14px;
      background: var(--signal);
      box-shadow: 0 0 22px rgba(200,255,93,.55);
      transform: rotate(45deg);
    }
    .status { color: var(--signal); }
    .status::before { content: "●"; margin-right: 8px; animation: pulse 1.8s ease-in-out infinite; }

    main {
      display: grid;
      grid-template-columns: .88fr 1.12fr;
      gap: clamp(38px, 7vw, 110px);
      align-items: center;
      min-height: calc(100vh - 112px);
      padding: 58px 0;
    }

    .eyebrow {
      color: var(--flare);
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin: 0 0 24px;
    }

    h1 {
      max-width: 650px;
      margin: 0;
      font-family: Baskerville, "Iowan Old Style", "Songti SC", serif;
      font-size: clamp(56px, 7.2vw, 104px);
      font-weight: 400;
      line-height: .88;
      letter-spacing: -.055em;
    }

    h1 em { color: var(--signal); font-style: italic; }

    .intro {
      max-width: 520px;
      margin: 34px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .protocol {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-top: 44px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .protocol div { background: var(--void); padding: 14px; }
    .protocol b { display: block; color: var(--ink); font-size: 11px; margin-bottom: 6px; }
    .protocol span { color: var(--muted); font-size: 10px; }

    .console {
      position: relative;
      padding: clamp(26px, 4vw, 52px);
      border: 1px solid #3c443e;
      background: rgba(17,21,19,.94);
      box-shadow: 18px 18px 0 rgba(200,255,93,.06), 0 28px 90px rgba(0,0,0,.36);
    }

    .console::before {
      content: "RX / DIRECTORY";
      position: absolute;
      top: -13px;
      right: 24px;
      padding: 5px 10px;
      color: var(--void);
      background: var(--signal);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
    }

    .console-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 34px;
    }

    h2 { margin: 0; font-size: 18px; font-weight: 500; letter-spacing: -.02em; }
    .packet { color: var(--muted); font-size: 10px; }

    .endpoint { display: grid; grid-template-columns: 1fr 118px; gap: 14px; }
    label { display: block; margin-bottom: 22px; }
    label span { display: block; color: var(--muted); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 9px; }

    input {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 0;
      outline: none;
      padding: 0 15px;
      color: var(--ink);
      background: #0b0e0c;
      font: inherit;
      font-size: 14px;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    input::placeholder { color: #545a55; }
    input:focus { border-color: var(--signal); box-shadow: inset 4px 0 0 var(--signal); }

    button {
      width: 100%;
      min-height: 62px;
      border: 0;
      padding: 0 22px;
      color: #0a0c0a;
      background: var(--signal);
      font: 700 13px/1 "SFMono-Regular", "Cascadia Code", monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }

    button:hover { transform: translate(-4px, -4px); background: #dcff94; box-shadow: 7px 7px 0 var(--flare); }
    button:active { transform: translate(0, 0); box-shadow: none; }

    .note { margin: 18px 0 0; color: var(--muted); font-size: 10px; line-height: 1.65; }
    .note strong { color: var(--flare); font-weight: 500; }

    @keyframes pulse { 50% { opacity: .25; } }

    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; padding-top: 70px; }
      h1 { font-size: clamp(58px, 15vw, 92px); }
      .console { margin-bottom: 30px; }
    }

    @media (max-width: 520px) {
      .shell { width: min(100% - 24px, 1180px); padding-top: 18px; }
      header > span:last-child { display: none; }
      main { gap: 48px; padding: 52px 0; }
      .endpoint { grid-template-columns: 1fr 96px; }
      .protocol { grid-template-columns: 1fr; }
      .console { padding: 30px 20px 24px; box-shadow: 8px 8px 0 rgba(200,255,93,.06); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand"><i class="brand-mark" aria-hidden="true"></i><span>UDP 文件接收站</span></div>
      <span class="status">本机桥接已就绪</span>
      <span>RAW UDP / V1</span>
    </header>

    <main>
      <section aria-labelledby="hero-title">
        <p class="eyebrow">Point-to-point directory retrieval</p>
        <h1 id="hero-title">把远端目录<br><em>拽回本机。</em></h1>
        <p class="intro">浏览器只连接本机助手。跨电脑的目录请求、分片、校验与重传全部通过 UDP 完成，目标服务器无需开放任何 TCP 或 HTTP 端口。</p>
        <div class="protocol" aria-label="协议特性">
          <div><b>1200 B</b><span>安全分片</span></div>
          <div><b>SHA-256</b><span>完整校验</span></div>
          <div><b>RETRY</b><span>逐块重传</span></div>
        </div>
      </section>

      <section class="console" aria-labelledby="download-title">
        <div class="console-head">
          <h2 id="download-title">建立接收任务</h2>
          <span class="packet">PKT 0000 → READY</span>
        </div>
        <form action="/download" method="post" target="_blank">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
          <div class="endpoint">
            <label>
              <span>目标服务器 IP</span>
              <input name="server" type="text" inputmode="decimal" value="{{.DefaultServer}}" placeholder="192.168.1.20" autocomplete="off" required>
            </label>
            <label>
              <span>UDP 端口</span>
              <input name="port" type="number" min="1" max="65535" value="{{.DefaultPort}}" required>
            </label>
          </div>
          <label>
            <span>远端目录（相对于服务端共享根目录）</span>
            <input name="path" type="text" placeholder="documents/2026" maxlength="1024" autocomplete="off" required>
          </label>
          <button type="submit">下载目录 ↘</button>
        </form>
        <p class="note"><strong>注意：</strong>下载会在新窗口启动；服务器返回的是经过校验的 tar.gz 归档。本地 HTTP 仅绑定 127.0.0.1，不会暴露给局域网。</p>
      </section>
    </main>
  </div>
</body>
</html>
